<!DOCTYPE html>
<html>
<head>
    <title>Sample Login Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Login Form</h2>

        <form id="loginForm">

            <label>Email</label>
            <input type="text" id="email">

            <label>Password</label>
            <input type="password" id="password">

            <button type="submit">Login</button>

            <p id="message"></p>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
